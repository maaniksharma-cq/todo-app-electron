name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: macos-15-intel
            platform: mac
            arch: x64
          - os: windows-latest
            platform: win
            arch: x64
          - os: windows-11-arm
            platform: win
            arch: arm64

    runs-on: ${{ matrix.os }}
    environment: zolo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # - name: Import macOS certificate
      #   if: matrix.platform == 'mac'
      #   env:
      #     MAC_CERTS: ${{ secrets.MAC_CERTS }}
      #     MAC_CERTS_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
      #   run: |
      #     CERT_PATH="$RUNNER_TEMP/certificate.p12"
      #     echo "$MAC_CERTS" | base64 --decode -o "$CERT_PATH"
      #     KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
      #     KEYCHAIN_PASSWORD=$(openssl rand -base64 20)
      #     security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
      #     security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
      #     security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
      #     security import "$CERT_PATH" -P "$MAC_CERTS_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
      #     security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
      #     security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build (macOS)
        if: matrix.platform == 'mac'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
        run: |
          if [ "${{ matrix.arch }}" == "arm64" ]; then
            npm run build && npx electron-builder --mac --arm64 --publish always
          else
            npm run build && npx electron-builder --mac --x64 --publish always
          fi

      - name: Import Windows certificate
        if: matrix.platform == 'win'
        env:
          WIN_CERTS: ${{ secrets.WIN_CERTS }}
          WIN_CERTS_PASSWORD: ${{ secrets.WIN_CERTS_PASSWORD }}
        shell: pwsh
        run: |
          $certPath = "$env:RUNNER_TEMP\certificate.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:WIN_CERTS))
          echo "WIN_CERT_PATH=$certPath" >> $env:GITHUB_ENV

      - name: Build (Windows)
        if: matrix.platform == 'win'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CSC_LINK: ${{ env.WIN_CERT_PATH }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTS_PASSWORD }}
        run: npm run build && npx electron-builder --win --${{ matrix.arch }} --publish always

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.nsis.7z
          if-no-files-found: ignore
